<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workers – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-full mb-4 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900">Workers</h1>
      <p class="text-gray-500 mt-1">Connect with the right people</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <!-- Tabs -->
      <div class="flex rounded-lg bg-gray-100 p-1 mb-6">
        <button id="tab-login"
          class="tab-btn flex-1 py-2 rounded-md text-sm font-medium transition-all duration-200 bg-white text-indigo-600 shadow"
          onclick="switchTab('login')">
          Sign In
        </button>
        <button id="tab-register"
          class="tab-btn flex-1 py-2 rounded-md text-sm font-medium transition-all duration-200 text-gray-500 hover:text-gray-700"
          onclick="switchTab('register')">
          Register
        </button>
      </div>

      <!-- Alert box -->
      <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

      <!-- Login Form -->
      <form id="form-login" class="space-y-4" novalidate>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="login-username">Username</label>
          <input id="login-username" type="text" autocomplete="username" placeholder="your_username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="login-password">Password</label>
          <div class="relative">
            <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition pr-10" />
            <button type="button" onclick="togglePassword('login-password', this)"
              class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
              <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2 mt-2">
          <span id="login-btn-text">Sign In</span>
          <svg id="login-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
            fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form id="form-register" class="hidden space-y-4" novalidate>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-username">Username</label>
            <input id="reg-username" type="text" autocomplete="username" placeholder="john_doe"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-email">Email</label>
            <input id="reg-email" type="email" autocomplete="email" placeholder="john@example.com"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-role">I am a…</label>
          <select id="reg-role"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition bg-white">
            <option value="worker">Worker – looking for jobs</option>
            <option value="employer">Employer – looking to hire</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-phone">Phone <span class="text-gray-400 font-normal">(optional)</span></label>
          <input id="reg-phone" type="tel" autocomplete="tel" placeholder="+1 555 000 0000"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-password">Password</label>
          <div class="relative">
            <input id="reg-password" type="password" autocomplete="new-password" placeholder="Min. 8 characters"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition pr-10" />
            <button type="button" onclick="togglePassword('reg-password', this)"
              class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
              <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-password-confirm">Confirm Password</label>
          <input id="reg-password-confirm" type="password" autocomplete="new-password" placeholder="Repeat password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2 mt-2">
          <span id="register-btn-text">Create Account</span>
          <svg id="register-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
            fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">© 2024 Workers. All rights reserved.</p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
